apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
apply plugin: "com.google.gms.google-services"
apply plugin: "com.google.firebase.crashlytics"

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    // Pass the absolute node path so Android Studio's Gradle daemon (which
    // doesn't inherit the shell PATH) can find node for ALL codegen tasks —
    // this value propagates to every library subproject via rootExtension.
    nodeExecutableAndArgs = [rootProject.properties.get("NODE_BINARY", "node") as String]

    /* Folders */
    //   The root of your project, i.e. where "package.json" lives. Default is '../..'
    // root = file("../../")
    //   The folder where the react-native NPM package is. Default is ../../node_modules/react-native
    // reactNativeDir = file("../../node_modules/react-native")
    //   The folder where the react-native Codegen package is. Default is ../../node_modules/@react-native/codegen
    // codegenDir = file("../../node_modules/@react-native/codegen")
    //   The cli.js file which is the React Native CLI entrypoint. Default is ../../node_modules/react-native/cli.js
    // cliFile = file("../../node_modules/react-native/cli.js")

    /* Variants */
    //   The list of variants to that are debuggable. For those we're going to
    //   skip the bundling of the JS bundle and the assets. Default is "debug", "debugOptimized".
    //   If you add flavors like lite, prod, etc. you'll have to list your debuggableVariants.
    // debuggableVariants = ["liteDebug", "liteDebugOptimized", "prodDebug", "prodDebugOptimized"]

    /* Bundling */
    //   A list containing the node command and its flags. Default is just 'node'.
    // nodeExecutableAndArgs = ["node"]
    //
    //   The command to run when bundling. By default is 'bundle'
    // bundleCommand = "ram-bundle"
    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   The hermes compiler command to run. By default it is 'hermesc'
    // hermesCommand = "$rootDir/my-custom-hermesc/bin/hermesc"
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]

    /* Autolinking */
    autolinkLibrariesWithApp()
    //
    // Added by install-expo-modules.
    // Use the absolute NODE_BINARY (gradle.properties) instead of bare "node" so
    // entryFile/cliFile resolution does not depend on the Gradle daemon's PATH.
    // Android Studio's daemon happens to have node on PATH, but a CLI daemon does
    // not — bare "node" then resolves to empty and cliFile falls back to the
    // project dir ("... is not a file"). This matches nodeExecutableAndArgs above
    // and settings.gradle, which already resolve node via NODE_BINARY.
    def nodeBinary = rootProject.properties.get("NODE_BINARY", "node") as String
    // @expo/cli is NOT hoisted to the top-level node_modules in this project — it
    // is nested under expo/node_modules. A bare require.resolve('@expo/cli') from
    // rootDir throws MODULE_NOT_FOUND, leaving cliFile empty (→ project dir →
    // "is not a file"). Resolve it relative to the expo package instead, the same
    // way settings.gradle resolves expo-modules-autolinking.
    entryFile = file([nodeBinary, "-e", "require('expo/scripts/resolveAppEntry')", rootDir.getAbsoluteFile().getParentFile().getAbsolutePath(), "android", "absolute"].execute(null, rootDir).text.trim())
    cliFile = new File([nodeBinary, "--print", "require.resolve('@expo/cli', { paths: [require('path').dirname(require.resolve('expo/package.json'))] })"].execute(null, rootDir).text.trim())
    bundleCommand = "export:embed"
}

/**
 * When "Clean Project" runs, also delete the CMake configuration cache (.cxx).
 * Without this, CMake detects a stale GLOB mismatch (codegen JNI dirs were wiped
 * by clean) and tries to re-configure BEFORE the codegen tasks re-run, causing
 * the externalNativeBuildClean task to fail with "not an existing directory".
 */
clean {
    delete "${projectDir}/.cxx"
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = false

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = io.github.react-native-community:jsc-android-intl:2026004.+`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

// Mirrors rootProject.ext.REACT_NATIVE_NODE_MODULES_DIR so library build scripts
// using safeAppExtGet() (reanimated, worklets, screens) also skip node resolution.
project.ext.REACT_NATIVE_NODE_MODULES_DIR = rootProject.ext.REACT_NATIVE_NODE_MODULES_DIR

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    // ⚠️ KAN-70: bundle ID changed from com.agenda → com.brush (affects Play Store listing identity)
    namespace "com.brush"
    defaultConfig {
        applicationId "com.brush"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // Caution! In production, you need to generate your own keystore file.
            // see https://reactnative.dev/docs/signed-apk-android.
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }

    // Wearable Data Layer API — provides DataClient and MessageClient for
    // Wear OS communication (KAN-35).
    implementation("com.google.android.gms:play-services-wearable:20.0.1")

    // Firebase Android SDK — required for direct Kotlin usage in
    // WearMessageListenerService (KAN-38). The BOM version is kept in sync
    // with @react-native-firebase (see node_modules/@react-native-firebase/app
    // package.json sdkVersions.android.firebase). The autolinking sub-projects
    // do not re-export these as api dependencies so :app must declare them explicitly.
    implementation(platform("com.google.firebase:firebase-bom:34.10.0"))
    implementation("com.google.firebase:firebase-auth")
    implementation("com.google.firebase:firebase-firestore")

    // Embeds the Wear OS companion APK into the phone AAB for Play Store
    // automatic watch installation (KAN-37). Only active when -PbundleWear
    // is passed; omitting it keeps the phone build fully independent.
    if (project.hasProperty('bundleWear')) {
        wearApp project(':wear')
    }
}
