pluginManagement { includeBuild("../node_modules/@react-native/gradle-plugin") }
plugins { id("com.facebook.react.settings") }
extensions.configure(com.facebook.react.ReactSettingsExtension){ ex ->
  // autolinkLibrariesFromCommand takes a List<String> (executable + args).
  // Passing the absolute node path avoids the "npx not found" error that
  // occurs when Android Studio's Gradle daemon doesn't inherit the shell PATH.
  def nodeBinary = providers.gradleProperty("NODE_BINARY").getOrElse("node")
  ex.autolinkLibrariesFromCommand([nodeBinary, "node_modules/.bin/react-native", "config"])
}
rootProject.name = 'Brush'
include ':app'
// The :wear module is a standalone Wear OS companion app — build it separately
// from the wear/ directory. It is not included here so wear build issues never
// block the phone app build.
includeBuild('../node_modules/@react-native/gradle-plugin')
