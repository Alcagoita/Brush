# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# CodeRabbit configuration for Brush
# https://docs.coderabbit.ai/configure-coderabbit

language: "en-US"

early_access: true

chat:
  auto_reply: true

reviews:
  auto_review:
    enabled: true
    drafts: false
    # Skip auto-review if PR title contains these keywords
    ignore_title_keywords:
      - "WIP"
    # Only auto-review PRs targeting these branches
    base_branches:
      - "develop"
      - "main"

  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  sequence_diagrams: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  changed_files_summary: true

  pre_merge_checks:
    description:
      mode: warning

  path_filters:
    - "!node_modules/**"
    - "!ios/Pods/**"
    - "!android/.gradle/**"
    - "!builds/**"
    - "!**/*.lock"
    - "!patches/**"

  path_instructions:
    - path: "**/*.{ts,tsx}"
      instructions: |
        React Native best practices:
        - Use FlatList/SectionList for lists — never ScrollView with .map()
        - StyleSheet.create instead of inline styles
        - React.memo, useMemo, useCallback where appropriate to avoid unnecessary re-renders
        - Clean up useEffect subscriptions, listeners and timers on unmount
        - Avoid 'any' — use explicit TypeScript types. Prefer 'import type' for type-only imports
        - Accessibility: touch targets min 44×44, screen reader support
        - Safe area handling and platform-specific code (iOS vs Android)
        - No exposed API keys or sensitive data in source

    - path: "src/theme/**"
      instructions: >
        Enforce design token usage. Flag any hardcoded color hex, rgba, font size,
        spacing value, or border radius. All values must come from useTheme() tokens
        or the radius/spacing constants in src/theme/tokens.ts.

    - path: "src/components/**"
      instructions: >
        Check that useTheme() is used for all colors. No drop shadows allowed —
        elevation and shadowColor props are forbidden. Dividers must use 1px solid
        line token. Ensure Geist font is referenced and fontVariant: ['tabular-nums']
        is applied on any numeric display. Never use emoji as icons; verify PoiIcon
        or AppIcon components are used instead.

    - path: "src/screens/**"
      instructions: >
        Verify horizontal page margin is 22. Confirm useTheme() for all colors.
        Check navigation flows match the defined structure (Today + Profile tabs).

    - path: "src/services/firestore.ts"
      instructions: >
        All Firestore reads and writes must be scoped to /users/{uid}/... — never
        access another user's data. Verify PointsHistoryEntry.reason is a
        discriminated union value. New point types must use a dedicated awardPoint*
        function; do not repurpose awardPoint(uid, taskId, taskTitle).

    - path: "src/services/**"
      instructions: >
        Firebase service calls must handle errors gracefully at system boundaries.
        No secrets or API keys in source. Geolocation logic must request 'always'
        permission and suppress duplicate notifications (once per geofence entry per day).

    - path: "__tests__/**"
      instructions: >
        Unit tests are required for all business logic. Components and screens use
        @testing-library/react-native; services and utilities use plain Jest.
        Flag tests that mock the database — integration tests must hit a real Firestore
        emulator, not mocks.

    - path: "metro.config.js"
      instructions: >
        Review Metro bundler configuration for: asset extensions are properly registered,
        transformer configuration is optimal for project needs, source map generation is
        appropriate for environment, no security issues with resolver configuration.

  tone_instructions: >
    This is a React Native app (iOS + Android) with Firebase backend following
    Gitflow. Be precise about React Native performance concerns (re-renders, JS thread
    blocking, Animated vs Reanimated). Call out Firebase security rule gaps and
    Firestore query inefficiencies. Reference the design system (tokens, no shadows,
    Geist font, tabular numerals) when reviewing UI code.
