name: Wear OS unit tests

permissions:
  contents: read

on:
  push:
    branches: [develop, main, 'KAN-*']
    paths:
      - 'wear/**'
      - '.github/workflows/wear-tests.yml'
  pull_request:
    branches: [develop]
    paths:
      - 'wear/**'

jobs:
  wear-unit-tests:
    name: Wear OS — JVM unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22.11.0'
          cache: npm

      - name: Install JS dependencies
        run: npm ci --ignore-scripts

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: android

      - name: Run wear unit tests
        run: ./gradlew -Dorg.gradle.java.home="$JAVA_HOME" -PincludeWear :wear:testDebugUnitTest
        working-directory: android

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wear-test-results
          path: android/wear/build/reports/tests/
