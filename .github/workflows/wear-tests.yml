name: Wear OS unit tests

on:
  push:
    branches: [develop, main, 'KAN-*']
    paths:
      - 'wear/**'
      - '.github/workflows/wear-tests.yml'
  pull_request:
    branches: [develop]
    paths:
      - 'wear/**'

jobs:
  wear-unit-tests:
    name: Wear OS — JVM unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install JS dependencies
        run: npm ci --ignore-scripts

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: android

      - name: Run wear unit tests
        run: ./gradlew -Dorg.gradle.java.home="$JAVA_HOME" :wear:test --tests "com.brush.wear.*"
        working-directory: android

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wear-test-results
          path: android/wear/build/reports/tests/
